<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Salon Gallary</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="dist/hamburgers.css" rel="stylesheet" />
  </head>
  <body class="ser-body">
    <header>
      <nav class="home-nav">
        <a href="index.html"><img id="logo" src="assets/logo.png" alt="Logo"></a>
        <a href="index.html" id="title">The Dream Unisex Salon</a>
        <button class="hamburger hamburger--spin" id="menu-btn" type="button">
          <span class="hamburger-box">
            <span class="hamburger-inner"></span>
          </span>
        </button>
        <div id="menu" class="hidden">
          <a href="index.html" class="menu-option">Home</a>
          <hr />
          <a href="gallary.html" class="menu-option">Gallary</a>
          <hr />
          <a href="booking.html" class="menu-option">Booking</a>
          <hr />
          <a href="services.html" class="menu-option">Services</a>
          <hr />
          <a href="contact.html" class="menu-option">Contact</a>
        </div>
      </nav>
    </header>
    <main class="gal-main">
      <div class="gallary">
        <img src="assets/gallary/g2.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g4.mp4" class="galimg"></video>
        <img src="assets/gallary/g3.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g6.mp4" class="galimg"></video>
        <img src="assets/gallary/g5.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g7.mp4" class="galimg"></video>
        <img src="assets/gallary/g9.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g8.mp4" class="galimg"></video>
        <img src="assets/gallary/g11.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g10.mp4" class="galimg"></video>
        <img src="assets/gallary/g12.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g13.mp4" class="galimg"></video>
        <img src="assets/gallary/g14.jpg" class="galimg" >
        <video autoplay muted loop playsinline src="assets/gallary/g15.mp4" class="galimg"></video>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
