<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      .admin-panel {
        margin: auto;
        margin-top: 50px;
        width: 80%;
        background: rgba(255, 255, 255, 0.16);
        border-radius: 16px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .list {
        margin: auto;
        margin-top: 20px;
        width: 80%;
        background: rgba(255, 255, 255, 0.16);
        border-radius: 16px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      h2 {
        align-self: center;
        justify-self: center;
        margin-top: 8px;
      }

      label {
        margin-left: 15%;
      }

      input {
        width: 70%;
        margin: auto;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        opacity: 0.5;
      }

      button {
        width: 60%;
        margin: auto;
        padding: 8px;
        border-radius: 5px;
        border: none;
        background-color: black;
        color: white;
      }

      button:hover {
        background-color: #333;
      }

      #lowbut {
        margin-bottom: 8px;
      }

      .blockedSlotsList h2 {
        margin: auto;
      }

      .blockedSlotsList button {
        width: 30%;
      }
    </style>
    <main>
      <div class="admin-panel">
        <h2>Block Appointment Slots</h2>

        <label>Select Date:</label>
        <input type="date" id="blockDate" />

        <label>Start Time:</label>
        <input type="time" id="startTime" />

        <label>End Time:</label>
        <input type="time" id="endTime" />

        <button onclick="blockSlot()">Block Slot</button>

        <button id="lowbut" onclick="blockFullDay()">Block Entire Day</button>
      </div>
      <div class="list">
        <h2>Blocked Slots</h2>

        <div id="blockedSlotsList">Loading blocked slots...</div>
      </div>
    </main>

    <!-- script -->

    <script>
      function blockSlot() {
        const date = document.getElementById("blockDate").value;
        const start = document.getElementById("startTime").value;
        const end = document.getElementById("endTime").value;

        if (date === "" || start === "" || end === "") {
          alert("Please fill all fields");
          return;
        }

        if (start >= end) {
          alert("End time must be later than start time");
          return;
        }

        fetch(
          "https://script.google.com/macros/s/AKfycbwAVdC0FQm2Z20g3SfpEvlyR7jgJUv_LfzNkiCU7CxbQ_yDqQc6WvR5y6MPQzKbchxi/exec",
          {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              date: date,
              start: start,
              end: end,
            }),
          },
        );

        alert("Slot blocked successfully");

        loadBlockedSlots();

        document.getElementById("startTime").value = "";
        document.getElementById("endTime").value = "";
      }

      function blockFullDay() {
        const date = document.getElementById("blockDate").value;

        if (date === "") {
          alert("Select date first");
          return;
        }

        fetch(
          "https://script.google.com/macros/s/AKfycbwAVdC0FQm2Z20g3SfpEvlyR7jgJUv_LfzNkiCU7CxbQ_yDqQc6WvR5y6MPQzKbchxi/exec",
          {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              date: date,
              start: "00:00",
              end: "23:59",
            }),
          },
        );

        alert("Full day blocked");

        loadBlockedSlots();
      }

      async function loadBlockedSlots() {
        const response = await fetch(
          "https://script.google.com/macros/s/AKfycbwAVdC0FQm2Z20g3SfpEvlyR7jgJUv_LfzNkiCU7CxbQ_yDqQc6WvR5y6MPQzKbchxi/exec",
        );

        const data = await response.json();

        const container = document.getElementById("blockedSlotsList");

        container.innerHTML = "";

        data.forEach((slot) => {
          const date = slot[0];

          const start = slot[1];

          const end = slot[2];

          const row = document.createElement("div");

          row.innerHTML = `${date} — ${start} to ${end}
            <button onclick="removeSlot('${date}','${start}','${end}')">
            Remove
            </button>`;

          container.appendChild(row);
        });
      }

      loadBlockedSlots();

      async function removeSlot(date, start, end) {
        await fetch(
          "https://script.google.com/macros/s/AKfycbwAVdC0FQm2Z20g3SfpEvlyR7jgJUv_LfzNkiCU7CxbQ_yDqQc6WvR5y6MPQzKbchxi/exec",
          {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              action: "delete",
              date: date,
              start: start,
              end: end,
            }),
          },
        );

        loadBlockedSlots();
      }

      document.getElementById("blockDate").min = new Date()
        .toISOString()
        .split("T")[0];
    </script>
  </body>
</html>
