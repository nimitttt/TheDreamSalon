<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Selection</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="dist/hamburgers.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="home-nav">
        <a href="index.html"
          ><img id="logo" src="assets/logo.png" alt="Logo"
        /></a>
        <a href="index.html" id="title">The Dream Unisex Salon</a>
        <button class="hamburger hamburger--spin" id="menu-btn" type="button">
          <span class="hamburger-box">
            <span class="hamburger-inner"></span>
          </span>
        </button>
        <div id="menu" class="hidden">
          <a href="index.html" class="menu-option">Home</a>
          <hr />
          <a href="gallary.html" class="menu-option">Gallary</a>
          <hr />
          <a href="booking.html" class="menu-option">Booking</a>
          <hr />
          <a href="services.html" class="menu-option">Services</a>
          <hr />
          <a href="contact.html" class="menu-option">Contact</a>
        </div>
      </nav>
    </header>
    <main class="book-main">
      <!-- Normal booking -->

      <div class="form-container" id="form1">
        <h2 class="book-title">Book Appointment ✂️</h2>
        <br />

        <form>
          <input
            id="name"
            class="data"
            type="text"
            placeholder="Name *"
            required
          />

          <input
            id="email"
            class="data"
            type="email"
            placeholder="Email (Optional)"
          />

          <input
            id="phone"
            class="data"
            type="tel"
            placeholder="Mobile Number *"
            required
          />

          <input
            id="locality"
            class="data"
            type="text"
            placeholder="Locality"
          />

          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>

          <label>Select Services</label>

          <div id="servicesContainer"></div>

          <label>Select Appointment Date</label>
          <input
            id="dateInput"
            type="date"
            class="data"
            placeholder="dd/mm/yyyy"
            required
          />

          <label>Select Appointment Time</label>
          <input
            id="timeInput"
            type="time"
            class="data"
            placeholder="time"
            required
          />

          <label>
            <input type="checkbox" required />
            I agree to receive WhatsApp updates & offers </label
          ><br /><br />

          <button class="data-transfer" type="button" onclick="sendBooking1()">
            Book Appointment 📅
          </button>
        </form>
      </div>

      <!-- Bridal Booking -->

      <div class="form-container" id="form2">
        <h2 class="book-title">Bridal Appointment</h2>
        <br />

        <form>
          <input
            id="bride-name"
            class="data"
            type="text"
            placeholder="Name *"
            required
          />

          <input
            id="bride-email"
            class="data"
            type="email"
            placeholder="Email (Optional)"
          />

          <input
            class="data"
            type="tel"
            placeholder="Mobile Number *"
            id="bride-phone"
            required
          />

          <input
            class="data"
            type="text"
            placeholder="Locality"
            id="bride-locality"
          />

          <div class="form-group">
            <label for="bridalPackage">Select Bridal Package</label>
            <select id="bridalPackage" name="bridalPackage" required>
              <option value="">Select Package</option>
              <option value="Basic Bridal Package">Basic Bridal Package</option>
              <option value="Premium Bridal Package">
                Premium Bridal Package
              </option>
              <option value="Luxury Bridal Package">
                Luxury Bridal Package
              </option>
            </select>
          </div>

          <div class="form-group">
            <label for="subbridalPackage">Select Sub-Bridal Package</label>
            <select id="subbridalPackage" name="subbridalPackage" required>
              <option value="">Select Sub-Package</option>
              <option value="First Setting">First Setting</option>
              <option value="Second Setting">
                Second Setting
              </option>
              <option value="Final Setting">
                Final Setting
              </option>
            </select>
          </div>

          <div class="form-group">
            <label>Select Makeup Type</label>

            <div class="multi-select-dropdown">
              <div class="dropdown-toggle" onclick="toggleMakeupDropdown()">
                Select Makeup
              </div>

              <div class="dropdown-options" id="makeupDropdown">
                <label>
                  <input type="checkbox" name="makeupType" value="HD Makeup" />
                  HD Makeup
                </label>

                <label>
                  <input
                    type="checkbox"
                    name="makeupType"
                    value="Airbrush Makeup"
                  />
                  Airbrush Makeup
                </label>

                <label>
                  <input
                    type="checkbox"
                    name="makeupType"
                    value="Matte Makeup"
                  />
                  Matte Makeup
                </label>

                <label>
                  <input
                    type="checkbox"
                    name="makeupType"
                    value="Glossy Makeup"
                  />
                  Glossy Makeup
                </label>
              </div>
            </div>
          </div>

          <div id="bridal-dates-section">
            <label>Function Dates</label>

            <div id="date-container">
              <div class="date-entry">
                <input
                  type="date"
                  class="bride-date"
                  name="bridal_date[]"
                  placeholder="dd/mm/yyyy"
                  required
                />

                <input
                  type="text"
                  name="function_name[]"
                  placeholder="Function name (optional)"
                  class="fun-name"
                />
              </div>
            </div>

            <button class="add-date" type="button" onclick="addDateField()">
              Add Another Function Date
            </button>
          </div>

          <button
            class="data-transfer"
            type="button"
            onclick="sendBridalBooking()"
          >
            Book Appointment 📅
          </button>
        </form>
      </div>
      <br />
    </main>
    <script src="script.js"></script>
  </body>
</html>
