<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Selection</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="dist/hamburgers.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="home-nav">
        <a href="index.html"
          ><img id="logo" src="assets/logo.png" alt="Logo"
        /></a>
        <a href="index.html" id="title">The Dream Unisex Salon</a>
        <button class="hamburger hamburger--spin" id="menu-btn" type="button">
          <span class="hamburger-box">
            <span class="hamburger-inner"></span>
          </span>
        </button>
        <div id="menu" class="hidden">
          <a href="index.html" class="menu-option">Home</a>
          <hr />
          <a href="gallary.html" class="menu-option">Gallary</a>
          <hr />
          <a href="booking.html" class="menu-option">Booking</a>
          <hr />
          <a href="services.html" class="menu-option">Services</a>
          <hr />
          <a href="contact.html" class="menu-option">Contact</a>
        </div>
      </nav>
    </header>
    <main class="book-main">
      <!-- Normal booking -->

      <div class="form-container" id="form1">
        <h2 class="book-title">Book Appointment ✂️</h2>
        <br />

        <form>
          <input
            id="name"
            class="data"
            type="text"
            placeholder="Name *"
            required
          />

          <input
            id="email"
            class="data"
            type="email"
            placeholder="Email (Optional)"
          />

          <input
            id="phone"
            class="data"
            type="tel"
            placeholder="Mobile Number *"
            required
          />

          <input
            id="locality"
            class="data"
            type="text"
            placeholder="Locality"
          />

          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>

          <label>Select Services</label>

          <div id="servicesContainer"></div>

          <label>Select Appointment Date</label>
          <input id="date" type="date" class="data" required />

          <label>Select Appointment Time</label>
          <input id="time" type="time" class="data" required />

          <label>
            <input type="checkbox" required />
            I agree to receive WhatsApp updates & offers </label
          ><br /><br />

          <button class="data-transfer" type="button" onclick="sendBooking1()">
            Book Appointment 📅
          </button>
        </form>
      </div>

      <!-- Bridal Booking -->

      <div class="form-container" id="form2">
        <h2 class="book-title">Bridal Appointment</h2>
        <br />

        <form>
          <input
            id="bride-name"
            class="data"
            type="text"
            placeholder="Name *"
            required
          />

          <input
            id="bride-email"
            class="data"
            type="email"
            placeholder="Email (Optional)"
          />

          <input
            class="data"
            type="tel"
            placeholder="Mobile Number *"
            id="bride-phone"
            required
          />

          <input
            class="data"
            type="text"
            placeholder="Locality"
            id="bride-locality"
          />

          <label id="service-selector">Select Services</label>
          <div class="dropdown-container">
            <button
              type="button"
              class="dropdown-btn"
              onclick="toggleBridalServices()"
            >
              Choose Services
            </button>

            <div class="dropdown-list" id="servicesList2">
              <label
                ><input type="checkbox" name="bridalService" value="Haircut" />
                Haircut</label
              >

              <label
                ><input
                  type="checkbox"
                  name="bridalService"
                  value="Beard Trim"
                />
                Beard Trim</label
              >

              <label
                ><input
                  type="checkbox"
                  name="bridalService"
                  value="Hair Styling"
                />
                Hair Styling</label
              >

              <label
                ><input type="checkbox" name="bridalService" value="Facial" />
                Facial</label
              >

              <label
                ><input
                  type="checkbox"
                  name="bridalService"
                  value="Head Massage"
                />
                Head Massage</label
              >

              <label
                ><input
                  type="checkbox"
                  name="bridalService"
                  value="Hair Color"
                />
                Hair Color</label
              >
            </div>
          </div>

          <div id="bridal-dates-section">
            <label>Function Dates</label>

            <div id="date-container">
              <div class="date-entry">
                <input
                  type="date"
                  class="bride-date"
                  name="bridal_date[]"
                  required
                />

                <input
                  type="text"
                  name="function_name[]"
                  placeholder="Function name (optional)"
                  class="fun-name"
                />
              </div>
            </div>

            <button class="add-date" type="button" onclick="addDateField()">
              Add Another Function Date
            </button>
          </div>

          <button
            class="data-transfer"
            type="button"
            onclick="sendBridalBooking()"
          >
            Book Appointment 📅
          </button>
        </form>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
