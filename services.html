<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Services</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="dist/hamburgers.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="home-nav">
        <a href="index.html"><img id="logo" src="assets/logo.png" alt="Logo"></a>
        <a href="index.html" id="title">The Dream Unisex Salon</a>
        <button class="hamburger hamburger--spin" id="menu-btn" type="button">
          <span class="hamburger-box">
            <span class="hamburger-inner"></span>
          </span>
        </button>
        <div id="menu" class="hidden">
          <a href="index.html" class="menu-option">Home</a>
          <hr />
          <a href="gallary.html" class="menu-option">Gallary</a>
          <hr />
          <a href="booking.html" class="menu-option">Booking</a>
          <hr />
          <a href="services.html" class="menu-option">Services</a>
          <hr />
          <a href="contact.html" class="menu-option">Contact</a>
        </div>
      </nav>
    </header>
    <main class="service-main">

      <!-- men sec  -->

      <div class="service-list">
        <h1>Men's</h1>
        <div class="ser-tab">
          <div class="div1">
            <img class="ser-img" src="assets/service/ms1.png" alt="Haircut" />
          </div>
          <div class="div2">
            <div class="ser-name"><p>Haircut</p></div>
            <div class="ser-price"><p>₹150</p></div>
          </div>
        </div>
        <div class="ser-tab">
          <div class="div1">
            <img class="ser-img" src="assets/service/ms2.png" alt="Haircut" />
          </div>
          <div class="div2">
            <div class="ser-name"><p>Shaving</p></div>
            <div class="ser-price"><p>₹100</p></div>
          </div>
        </div>
        <div class="ser-tab">
          <div class="div1">
            <img class="ser-img" src="assets/service/ms3.png" alt="Haircut" />
          </div>
          <div class="div2">
            <div class="ser-name"><p>Face D-tan</p></div>
            <div class="ser-price"><p>₹249</p></div>
          </div>
        </div>
      </div><br><br>

      <!-- womens sec  -->

      <div class="service-list">
        <h1>Women's</h1>
        <div class="ser-tab">
          <div class="div1">
            <img class="ser-img" src="assets/service/fs1.png" alt="Haircut" />
          </div>
          <div class="div2">
            <div class="ser-name"><p>Eyebrow & Upperlip</p></div>
            <div class="ser-price"><p>₹49</p></div>
          </div>
        </div>
        <div class="ser-tab">
          <div class="div1">
            <img class="ser-img" src="assets/service/fs2.png" alt="Haircut" />
          </div>
          <div class="div2">
            <div class="ser-name"><p>Face Wax (Naturoot)</p></div>
            <div class="ser-price"><p>₹99</p></div>
          </div>
        </div>
        <div class="ser-tab">
          <div class="div1">
            <img class="ser-img" src="assets/service/fs3.png" alt="Haircut" />
          </div>
          <div class="div2">
            <div class="ser-name"><p>Full hand & Drums Wax</p></div>
            <div class="ser-price"><p>₹199</p></div>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>

</html>
